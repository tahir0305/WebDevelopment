<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Information System</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 80%;
            max-width: 800px;
        }

        .header-info h3 {
            margin: 5px 0;
            font-weight: 500;
            color: #333;
        }

        h2 {
            color: #2c3e50;
            margin-top: 25px;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #edf2f7;
        }

        th {
            background-color: #f8fafc;
            color: #4a5568;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background-color: #f1f5f9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">
        <h3><strong>Name :</strong> Tahir Patel</h3>
        <h3><strong>Division :</strong> A</h3>
        <h3><strong>Class :</strong> S. Y. B. Tech CSE</h3>
        <h3><strong>Batch :</strong> S3</h3>
        <h3><strong>Roll No. :</strong> 54</h3>
    </div>

    <h2>Student Information Table</h2>

    <table>
        <thead>
            <tr>
                <th>Roll no</th>
                <th>Name</th>
                <th>Course</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>11</td>
                <td>Tahir</td>
                <td>Computer Science</td>
                <td>85</td>
            </tr>
            <tr>
                <td>12</td>
                <td>Riddhi</td>
                <td>Information Technology</td>
                <td>94</td>
            </tr>
            <tr>
                <td>13</td>
                <td>Surya</td>
                <td>Computer Networks</td>
                <td>88</td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
