<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>GDG Entry Form</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
        
            background: linear-gradient(135deg, #f8f9fa 0%, #e8f0fe 100%);
            font-family: "Inter", sans-serif;
            color: #202124;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .header-info {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #dadce0;
        }

        .header-info h3 {
            color: #5f6368;
            font-size: 13px;
            margin: 6px 0;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .gdg-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }

        h1 {
            color: #1a73e8; 
            text-align: center;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        h2 {
            color: #5f6368;
            font-size: 15px;
            margin-bottom: 35px;
            text-align: center;
            font-weight: 400;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 24px;
        }

        p {
            color: #202124;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        label {
            display: block;
            color: #3c4043;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="email"],
        select,
        textarea {
            padding: 12px 16px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            color: #202124;
            background: #ffffff;
            width: 100%;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .radio-container {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }

        input[type="radio"] {
            margin-right: 8px;
            accent-color: #1a73e8;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s, transform 0.1s;
        }

        .btn-submit:hover {
            background-color: #1765cc;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .container { padding: 25px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="header-info">
            <h3>Name : Tahir Patel</h3>
            <h3>Division : A</h3>
            <h3>Class : S. Y. B. Tech CSE</h3>
            <h3>Batch : S3</h3>
            <h3>Roll No. : 54</h3>
        </div>

        <h1>Google Developers Group</h1>
        <h2>Join our community of developers to learn, connect, and grow together.</h2>

        <form>
            <div class="form-group">
                <div class="form-row">
                    <div>
                        <label for="Fname">First Name</label>
                        <input type="text" id="Fname" placeholder="Enter first name" required>
                    </div>
                    <div>
                        <label for="Lname">Last Name</label>
                        <input type="text" id="Lname" placeholder="Enter last name" required>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Institutional Email</label>
                <input type="email" id="email" placeholder="tahir.patel@college.edu" required>
            </div>

            <div class="form-group">
                <p>Have you attended a GDG event before?</p>
                <div class="radio-container">
                    <label class="radio-option"><input type="radio" name="event" value="yes"> Yes</label>
                    <label class="radio-option"><input type="radio" name="event" value="no"> No</label>
                </div>
            </div>

            <div class="form-group">
                <p>Core Interest Area</p>
                <select name="interest" required>
                    <option value="">-- Choose an Area --</option>
                    <option value="web">Web Development</option>
                    <option value="cloud">Cloud Computing</option>
                    <option value="ml">Machine Learning</option>
                    <option value="android">Android Development</option>
                    <option value="uiux">UI/UX Design</option>
                </select>
            </div>

            <div class="form-group">
                <p>Technical Skills</p>
                <textarea name="skills" placeholder="List languages or frameworks you are familiar with (e.g., Python, C++, TensorFlow)..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Register for GDG</button>
        </form>
    </div>

</body>
</html>
