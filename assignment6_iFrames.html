<!DOCTYPE html>
<html>
<head>
    <title>Modern Iframe Showcase</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            display: flex;
            width: 850px;
            height: 450px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .left-panel {
            width: 35%;
            padding: 25px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .left-panel h2 {
            margin-bottom: 10px;
        }

        .left-panel p {
            font-size: 14px;
            opacity: 0.8;
        }

        .right-panel {
            width: 65%;
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn {
            margin-top: 15px;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #00c6ff;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0072ff;
            transform: translateY(-2px);
        }

        .footer {
            position: absolute;
            bottom: 15px;
            color: #ddd;
            font-size: 13px;
        }
    </style>

</head>
<body>

    <div class="container">
        
        <div class="left-panel">
            <h2>Web Preview</h2>
            <p>Explore content directly inside this embedded frame with a modern UI layout.</p>
            
            <button class="btn" onclick="alert('Welcome to the preview!')">
                Launch Message
            </button>
        </div>

        <div class="right-panel">
            <iframe src="https://www.wikipedia.org" title="Preview"></iframe>
        </div>

    </div>

    <div class="footer">
        Stylish Iframe Layout • Practical Demo
    </div>

</body>
</html>
