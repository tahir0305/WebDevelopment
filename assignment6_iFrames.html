<!DOCTYPE html>
<html>
<head>
    <title>Creative Iframe Practical</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            width: 750px;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
        }

        h1 {
            margin-top: 0;
            color: #333;
            animation: fadeIn 2s ease-in-out;
        }

        iframe {
            width: 100%;
            height: 350px;
            border: none;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-top: 15px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #667eea;
            color: white;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #764ba2;
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        footer {
            margin-top: 15px;
            font-size: 14px;
            color: gray;
        }
    </style>

</head>
<body>

    <div class="card">
        <h1>🌐 Creative HTML Iframe</h1>

        <iframe src="https://www.example.com" 
                title="Example Site">
        </iframe>

        <button onclick="alert('Iframe Loaded Successfully!')">
            Click Me
        </button>

        <footer>
            Designed for Practical Exam ✨
        </footer>
    </div>

</body>
</html>
